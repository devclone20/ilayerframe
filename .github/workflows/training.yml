name: Training — LAYER FRAME

# Scheduled agent self-improvement pass: the specialist agents review this repo
# and emit a report (uploaded as an artifact). Safe by design — with no
# ANTHROPIC_API_KEY secret the run SKIPS cleanly (green); API errors are logged
# but never fail the schedule. Cadence mirrors the agent hub (devclone20/iclone):
# 3 days/week.

on:
  schedule:
    - cron: '31 5 * * 1,3,5'   # Mon/Wed/Fri 05:31 UTC (offset from the 05:00 hub)
  workflow_dispatch:
    inputs:
      note:
        description: 'Optional note'
        required: false
        default: 'Manual'

permissions:
  contents: read

jobs:
  train:
    name: Agent review
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TRAIN_AGENTS: 'engineer,designer,hacker'
      TRAIN_FOCUS: 'A single-file, 100% client-side image-layering studio (index.html). Focus on canvas/layering correctness, UX polish and client-side security (no backend).'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install anthropic
      - name: Run training review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python .github/training/review.py
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-report
          path: training_reports/
          if-no-files-found: ignore
